{% extends 'base.html' %}

{% block title %}Login - TransitOps{% endblock %}
{% block page_title %}Login to TransitOps{% endblock %}

{% block content %}
<div class="card" style="max-width: 400px; margin: 40px auto;">
    <h2 style="margin-bottom: 24px; text-align: center; color: var(--primary);">Sign In</h2>
    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label class="form-label" for="id_username">Username</label>
            <input type="text" name="username" id="id_username" class="form-control" required autofocus>
        </div>
        <div class="form-group">
            <label class="form-label" for="id_password">Password</label>
            <input type="password" name="password" id="id_password" class="form-control" required>
        </div>
        {% if form.errors %}
            <div class="error-text" style="margin-bottom: 16px;">
                Your username and password didn't match. Please try again.
            </div>
        {% endif %}
        <button type="submit" class="btn btn-primary w-full">Log In</button>
    </form>
</div>
{% endblock %}
