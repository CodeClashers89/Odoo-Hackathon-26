{% extends 'base.html' %}

{% block title %}Reports - TransitOps{% endblock %}
{% block page_title %}Reports & Analytics{% endblock %}

{% block content %}
<div style="margin-bottom: 24px; display: flex; justify-content: flex-end;">
    <a href="{% url 'export_csv' %}" class="btn btn-ghost" style="border: 1px solid var(--border);">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 8px;"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
        Export CSV
    </a>
</div>

<div class="grid grid-cols-2" style="gap: 24px;">
    <div class="card">
        <h3 style="margin-bottom: 16px; color: var(--text-muted); font-weight: 500;">Operational Cost per Vehicle</h3>
        <canvas id="costChart" height="250"></canvas>
    </div>
    <div class="card">
        <h3 style="margin-bottom: 16px; color: var(--text-muted); font-weight: 500;">Fuel Efficiency (km/L)</h3>
        <canvas id="efficiencyChart" height="250"></canvas>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    document.addEventListener('DOMContentLoaded', function() {
        fetch('{% url "reports_data" %}')
            .then(response => response.json())
            .then(data => {
                // Cost Chart (Stacked Bar)
                const costCtx = document.getElementById('costChart').getContext('2d');
                new Chart(costCtx, {
                    type: 'bar',
                    data: {
                        labels: data.cost_data.map(d => d.label),
                        datasets: [
                            {
                                label: 'Fuel Cost (₹)',
                                data: data.cost_data.map(d => d.fuel),
                                backgroundColor: 'rgba(79, 70, 229, 0.8)',
                            },
                            {
                                label: 'Maintenance Cost (₹)',
                                data: data.cost_data.map(d => d.maintenance),
                                backgroundColor: 'rgba(245, 158, 11, 0.8)',
                            }
                        ]
                    },
                    options: {
                        responsive: true,
                        scales: {
                            x: { stacked: true },
                            y: { stacked: true, beginAtZero: true }
                        }
                    }
                });

                // Efficiency Chart (Line/Bar)
                const effCtx = document.getElementById('efficiencyChart').getContext('2d');
                new Chart(effCtx, {
                    type: 'bar',
                    data: {
                        labels: data.efficiency_data.map(d => d.label),
                        datasets: [{
                            label: 'Efficiency (km/L)',
                            data: data.efficiency_data.map(d => d.efficiency),
                            backgroundColor: 'rgba(16, 185, 129, 0.8)',
                        }]
                    },
                    options: {
                        responsive: true,
                        scales: {
                            y: { beginAtZero: true }
                        }
                    }
                });
            });
    });
</script>
{% endblock %}
